<!DOCTYPE html>
<html>
<head>
  <title>SMPS Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    @font-face {
      font-family: "Gotham Black";
      src: url("fonts/Gotham-Black.woff2") format("woff2");
      font-weight: 900;
      font-style: normal;
    }

    @font-face {
      font-family: "Gilroy Light";
      src: url("fonts/Gilroy-Light.woff2") format("woff2");
      font-weight: 300;
      font-style: normal;
    }

    @font-face {
      font-family: "Gilroy Regular";
      src: url("fonts/Gilroy-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: "Gilroy Bold";
      src: url("fonts/Gilroy-Bold.woff2") format("woff2");
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: "Gilroy ExtraBold";
      src: url("fonts/Gilroy-ExtraBold.woff2") format("woff2");
      font-weight: 800;
      font-style: normal;
    }

    :root {
      --font-headline: "Gotham Black", Gotham, "Arial Black", sans-serif;
      --font-label: "Gilroy ExtraBold", "Gilroy Bold", Gilroy, "Arial Black", sans-serif;
      --font-label-bold: "Gilroy Bold", Gilroy, "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-regular: "Gilroy Regular", Gilroy, "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-body: "Gilroy Light", Gilroy, "Helvetica Neue", Helvetica, Arial, sans-serif;
      --smps-blue: #55c5e5;
      --smps-navy: #103d5b;
      --smps-gold: #f4a71c;
      --smps-black: #000;
      --smps-gray: #f5f5f5;
      --smps-border: #ddd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 14px;
      line-height: 1.42857143;
      color: #333;
      background: #fff;
    }

    .site-header {
      background: var(--smps-blue);
      padding: 22px 0;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .site-title {
      font-family: var(--font-headline);
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    .site-subtitle {
      font-family: var(--font-regular);
      font-weight: 400;
      color: #fff;
      margin-top: 6px;
      font-size: 15px;
    }

    .page-title {
      padding: 34px 0 22px;
      border-bottom: 1px solid #e5e5e5;
      margin-bottom: 24px;
    }

    .page-title h1 {
      font-family: var(--font-headline);
      font-size: 34px;
      line-height: 1.2;
      color: var(--smps-black);
      font-weight: 900;
      margin: 0;
    }

    .page-title p {
      margin-top: 8px;
      color: #555;
      font-size: 16px;
    }

    .search-box-wrapper {
      background: transparent;
      color: #333;
      margin-bottom: 28px;
    }

    .search-elements {
      background: var(--smps-gray);
      border: 1px solid var(--smps-border);
      padding: 18px 0;
    }

    .search-inner {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-icon {
      font-size: 20px;
      color: var(--smps-navy);
      width: 24px;
      text-align: center;
    }

    .search-box {
      width: 100%;
    }

    .search-form {
      display: flex;
      width: 100%;
      gap: 10px;
    }

    .search-field {
      width: 100%;
      height: 42px;
      padding: 8px 12px;
      border: 1px solid #ccc;
      font-size: 15px;
      font-family: var(--font-body);
      font-weight: 300;
    }

    .search-submit {
      font-family: var(--font-regular);
      height: 42px;
      padding: 0 22px;
      background: var(--smps-gold);
      border: 0;
      color: var(--smps-black);
      font-weight: 400;
      cursor: pointer;
    }

    .search-submit:hover {
      background: var(--smps-black);
      color: #fff;
    }

    .event-count {
      margin: 0 0 18px;
      color: #666;
      font-size: 14px;
    }

    .event-list {
      margin-bottom: 50px;
    }

    .event {
      border-bottom: 1px solid var(--smps-border);
      padding: 24px 0;
    }

    .event:first-child {
      border-top: 1px solid var(--smps-border);
    }

    .event h2 {
      font-family: var(--font-label);
      font-size: 24px;
      line-height: 1.25;
      color: var(--smps-navy);
      font-weight: 700;
      margin: 0 0 10px;
    }

    .event-meta {
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      margin-bottom: 10px;
    }

    .event-meta strong {
      font-family: var(--font-label);
      font-weight: 700;
      color: var(--smps-black);
    }

    .event-description {
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      max-width: 900px;
    }

    .chapter-label {
      font-family: var(--font-label);
      display: inline-block;
      background: #fff3c7;
      color: var(--smps-black);
      padding: 5px 10px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .site-footer {
      border-top: 1px solid var(--smps-border);
      padding: 22px 0;
      color: #777;
      font-size: 13px;
    }

    @media only screen and (max-width: 700px) {
      .site-title {
        font-size: 24px;
      }

      .page-title h1 {
        font-size: 28px;
      }

      .search-form {
        flex-direction: column;
      }

      .search-submit {
        width: 100%;
      }
    }
.event-actions {
  margin-top: 14px;
}

.event-button {
  font-family: var(--font-label);
  display: inline-block;
  background: var(--smps-gold);
  color: var(--smps-black);
  padding: 10px 18px;
  text-decoration: none;
  font-weight: 700;
}

.event-button:hover {
  background: var(--smps-black);
  color: #fff;
}
.filters-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  margin: 0 0 20px;
}

.filters-grid select {
  font-family: var(--font-label-bold);
  height: 38px;
  padding: 6px 10px;
  border: 1px solid #ccc;
  font-weight: 700;
}

#map {
  height: 420px;
  margin: 0 0 28px;
  border: 1px solid var(--smps-border);
}

.virtual-label {
  font-family: var(--font-label);
  display: inline-block;
  background: var(--smps-blue);
  color: var(--smps-black);
  padding: 5px 10px;
  margin-left: 8px;
  font-size: 13px;
  font-weight: 700;
}

@media only screen and (max-width: 900px) {
  .filters-grid {
    grid-template-columns: 1fr;
  }
}
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">SMPS Events</h1>
      <div class="site-subtitle">Chapter event aggregator</div>
    </div>
  </header>

  <main class="container">
    <section class="page-title">
      <h1>Upcoming Events</h1>
      <p>Browse upcoming SMPS chapter events from one central page.</p>
    </section>

    <div id="search-container" class="search-box-wrapper">
      <div class="search-elements">
        <div class="container">
          <div class="search-inner">
            <div class="search-icon">&#128269;</div>
            <div class="search-box">
              <form class="search-form" role="search">
                <input
                  id="search"
                  type="search"
                  title="Search events"
                  placeholder="Search..."
                  class="search-field"
                >
                <input type="submit" value="Search" class="search-submit">
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
<div class="filters-grid">
  <select id="chapter-filter">
    <option value="">All Chapters</option>
  </select>

  <select id="state-filter">
    <option value="">All States</option>
  </select>

  <select id="region-filter">
    <option value="">All Regions</option>
  </select>

  <select id="month-filter">
    <option value="">All Months</option>
  </select>

  <select id="year-filter">
    <option value="">All Years</option>
  </select>

  <select id="format-filter">
    <option value="">Virtual + In-Person</option>
    <option value="virtual">Virtual</option>
    <option value="in-person">In-Person</option>
  </select>
</div>
<div id="map" style="display:none;"></div>
    <p id="event-count" class="event-count">Loading events...</p>
    <div id="events" class="event-list"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      Event information is pulled from public chapter event pages. Always confirm details with the host chapter before registering.
    </div>
  </footer>

<script>
  let allEvents = [];
  let map;
  let markersLayer;

  const filters = {
    search: "",
    chapter: "",
    state: "",
    region: "",
    month: "",
    year: "",
    format: ""
  };

  function getMonthName(dateText) {
    if (!dateText) return "";
    return dateText.split(" ")[0];
  }

  function getYear(dateText) {
    if (!dateText) return "";
    const parts = dateText.split(", ");
    return parts.length > 1 ? parts[1] : "";
  }

  function populateSelect(id, values) {
    const select = document.getElementById(id);
    const current = select.value;

    values.forEach(value => {
      if (!value) return;
      const option = document.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });

    select.value = current;
  }

  function setupFilters(events) {
    populateSelect("chapter-filter", [...new Set(events.map(e => e.chapter))].sort());
    populateSelect("state-filter", [...new Set(events.map(e => e.state))].sort());
    populateSelect("region-filter", [...new Set(events.map(e => e.region))].sort());
    populateSelect("month-filter", [...new Set(events.map(e => getMonthName(e.date)))].sort((a, b) => {
      const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      return months.indexOf(a) - months.indexOf(b);
    }));
    populateSelect("year-filter", [...new Set(events.map(e => getYear(e.date)))].sort());

    document.getElementById("chapter-filter").addEventListener("change", e => {
      filters.chapter = e.target.value;
      applyFilters();
    });

    document.getElementById("state-filter").addEventListener("change", e => {
      filters.state = e.target.value;
      applyFilters();
    });

    document.getElementById("region-filter").addEventListener("change", e => {
      filters.region = e.target.value;
      applyFilters();
    });

    document.getElementById("month-filter").addEventListener("change", e => {
      filters.month = e.target.value;
      applyFilters();
    });

    document.getElementById("year-filter").addEventListener("change", e => {
      filters.year = e.target.value;
      applyFilters();
    });

    document.getElementById("format-filter").addEventListener("change", e => {
      filters.format = e.target.value;
      applyFilters();
    });
  }

  function getFilteredEvents() {
    const q = filters.search.toLowerCase().trim();

    return allEvents.filter(event => {
      const matchesSearch = !q || [
        event.title,
        event.chapter,
        event.state,
        event.region,
        event.city,
        event.date,
        event.time,
        event.location,
        event.description
      ].some(value => (value || "").toLowerCase().includes(q));

      const matchesChapter = !filters.chapter || event.chapter === filters.chapter;
      const matchesState = !filters.state || event.state === filters.state;
      const matchesRegion = !filters.region || event.region === filters.region;
      const matchesMonth = !filters.month || getMonthName(event.date) === filters.month;
      const matchesYear = !filters.year || getYear(event.date) === filters.year;

      const matchesFormat =
        !filters.format ||
        (filters.format === "virtual" && event.is_virtual) ||
        (filters.format === "in-person" && !event.is_virtual);

      return matchesSearch && matchesChapter && matchesState && matchesRegion && matchesMonth && matchesYear && matchesFormat;
    });
  }

  function renderEvents(events) {
    const container = document.getElementById("events");
    const count = document.getElementById("event-count");

    count.textContent = `${events.length} event${events.length === 1 ? "" : "s"} found`;

    if (!events.length) {
      container.innerHTML = "<p>No events found.</p>";
      return;
    }

    container.innerHTML = events.map(event => `
      <article class="event">
        <div class="chapter-label">${event.chapter || "SMPS Chapter"}</div>
        ${event.is_virtual ? `<span class="virtual-label">Virtual</span>` : `<span class="virtual-label">In-Person</span>`}
        <h2>${event.title || "Untitled Event"}</h2>
        <div class="event-meta">
          <strong>Date:</strong> ${event.date || "TBD"}<br>
          <strong>Time:</strong> ${event.time || "TBD"}<br>
          <strong>Location:</strong> ${event.location || "TBD"}<br>
          <strong>State/Region:</strong> ${event.state || "N/A"} / ${event.region || "N/A"}
        </div>
        <div class="event-description">${event.description || ""}</div>
        <div class="event-actions">
          ${event.detail_url ? `<a class="event-button" href="${event.detail_url}" target="_blank">View Details</a>` : ""}
        </div>
      </article>
    `).join("");
  }

  function initMap() {
    map = L.map("map").setView([39.5, -95.7], 4);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    markersLayer = L.layerGroup().addTo(map);
  }

  function updateMap(events) {
    markersLayer.clearLayers();

    const chapterMap = new Map();

    events.forEach(event => {
      if (!event.latitude || !event.longitude) return;

      const key = event.chapter;

      if (!chapterMap.has(key)) {
        chapterMap.set(key, {
          chapter: event.chapter,
          city: event.city,
          state: event.state,
          region: event.region,
          latitude: event.latitude,
          longitude: event.longitude,
          count: 0
        });
      }

      chapterMap.get(key).count += 1;
    });

    const markers = [];

    chapterMap.forEach(chapter => {
      const marker = L.marker([chapter.latitude, chapter.longitude])
        .bindPopup(`
          <strong>${chapter.chapter}</strong><br>
          ${chapter.city || ""}, ${chapter.state || ""}<br>
          ${chapter.region || ""}<br>
          ${chapter.count} event${chapter.count === 1 ? "" : "s"}
        `);

      marker.addTo(markersLayer);
      markers.push(marker);
    });

    if (markers.length) {
      const group = L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.25));
    }
  }

  function applyFilters() {
    const filtered = getFilteredEvents();
    renderEvents(filtered);
    updateMap(filtered);
  }

  fetch("events.json?v=" + Date.now())
    .then(response => response.json())
    .then(events => {
      allEvents = events;
      initMap();
      setupFilters(allEvents);
      applyFilters();

      const searchInput = document.getElementById("search");
      const form = document.querySelector(".search-form");

      searchInput.addEventListener("input", event => {
        filters.search = event.target.value;
        applyFilters();
      });

      form.addEventListener("submit", event => {
        event.preventDefault();
        filters.search = searchInput.value;
        applyFilters();
      });
    });
</script>
</body>
</html>
