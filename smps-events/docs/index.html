<!DOCTYPE html>
<html>
<head>
  <title>SMPS Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.42857143;
      color: #333;
      background: #fff;
    }

    .site-header {
      background: #55c5e5;
      padding: 22px 0;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .site-title {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    .site-subtitle {
      color: #fff;
      margin-top: 6px;
      font-size: 15px;
    }

    .page-title {
      padding: 34px 0 22px;
      border-bottom: 1px solid #e5e5e5;
      margin-bottom: 24px;
    }

    .page-title h1 {
      font-family: Georgia, Times, "Times New Roman", serif;
      font-size: 34px;
      line-height: 1.2;
      color: #103d5b;
      font-weight: 700;
      margin: 0;
    }

    .page-title p {
      margin-top: 8px;
      color: #555;
      font-size: 16px;
    }

    .search-box-wrapper {
      background: transparent;
      color: #333;
      margin-bottom: 28px;
    }

    .search-elements {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 18px 0;
    }

    .search-inner {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-icon {
      font-size: 20px;
      color: #103d5b;
      width: 24px;
      text-align: center;
    }

    .search-box {
      width: 100%;
    }

    .search-form {
      display: flex;
      width: 100%;
      gap: 10px;
    }

    .search-field {
      width: 100%;
      height: 42px;
      padding: 8px 12px;
      border: 1px solid #ccc;
      font-size: 15px;
      font-family: inherit;
    }

    .search-submit {
      height: 42px;
      padding: 0 22px;
      background: #f4a71c;
      border: 0;
      color: #000;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    .search-submit:hover {
      background: #000;
      color: #fff;
    }

    .event-count {
      margin: 0 0 18px;
      color: #666;
      font-size: 14px;
    }

    .event-list {
      margin-bottom: 50px;
    }

    .event {
      border-bottom: 1px solid #ddd;
      padding: 24px 0;
    }

    .event:first-child {
      border-top: 1px solid #ddd;
    }

    .event h2 {
      font-size: 24px;
      line-height: 1.25;
      color: #103d5b;
      font-weight: 700;
      margin: 0 0 10px;
    }

    .event-meta {
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      margin-bottom: 10px;
    }

    .event-meta strong {
      font-weight: 700;
      color: #000;
    }

    .event-description {
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      max-width: 900px;
    }

    .chapter-label {
      display: inline-block;
      background: #fff3c7;
      color: #000;
      padding: 5px 10px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .site-footer {
      border-top: 1px solid #ddd;
      padding: 22px 0;
      color: #777;
      font-size: 13px;
    }

    @media only screen and (max-width: 700px) {
      .site-title {
        font-size: 24px;
      }

      .page-title h1 {
        font-size: 28px;
      }

      .search-form {
        flex-direction: column;
      }

      .search-submit {
        width: 100%;
      }
    }
    .filter-row {
  margin: 0 0 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.filter-row label {
  font-weight: 700;
}

.filter-row select {
  height: 38px;
  padding: 6px 10px;
  border: 1px solid #ccc;
  font-family: inherit;
}

.event-actions {
  margin-top: 14px;
}

.event-button {
  display: inline-block;
  background: #f4a71c;
  color: #000;
  padding: 10px 18px;
  text-decoration: none;
  font-weight: 700;
}

.event-button:hover {
  background: #000;
  color: #fff;
}
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">SMPS Events</h1>
      <div class="site-subtitle">Chapter event aggregator</div>
    </div>
  </header>

  <main class="container">
    <section class="page-title">
      <h1>Upcoming Events</h1>
      <p>Browse upcoming SMPS chapter events from one central page.</p>
    </section>

    <div id="search-container" class="search-box-wrapper">
      <div class="search-elements">
        <div class="container">
          <div class="search-inner">
            <div class="search-icon">🔍</div>
            <div class="search-box">
              <form class="search-form" role="search">
                <input
                  id="search"
                  type="search"
                  title="Search events"
                  placeholder="Search…"
                  class="search-field"
                >
                <input type="submit" value="Search" class="search-submit">
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <p id="event-count" class="event-count">Loading events...</p>
<div class="filter-row">
  <label for="chapter-filter">Filter by chapter:</label>
  <select id="chapter-filter">
    <option value="">All Chapters</option>
  </select>
</div>
    <div id="events" class="event-list"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      Event information is pulled from public chapter event pages. Always confirm details with the host chapter before registering.
    </div>
  </footer>

 <script>
  let allEvents = [];
  let currentSearch = "";
  let currentChapter = "";

  function renderEvents(events) {
    const container = document.getElementById("events");
    const count = document.getElementById("event-count");

    count.textContent = `${events.length} event${events.length === 1 ? "" : "s"} found`;

    if (!events.length) {
      container.innerHTML = "<p>No events found.</p>";
      return;
    }

    container.innerHTML = events.map(event => `
      <article class="event">
        <div class="chapter-label">${event.chapter || "SMPS Chapter"}</div>
        <h2>${event.title || "Untitled Event"}</h2>
        <div class="event-meta">
          <strong>Date:</strong> ${event.date || "TBD"}<br>
          <strong>Time:</strong> ${event.time || "TBD"}<br>
          <strong>Location:</strong> ${event.location || "TBD"}
        </div>
        <div class="event-description">${event.description || ""}</div>
        <div class="event-actions">
          ${event.detail_url ? `<a class="event-button" href="${event.detail_url}" target="_blank">View Details</a>` : ""}
        </div>
      </article>
    `).join("");
  }

  function applyFilters() {
    const q = currentSearch.toLowerCase().trim();

    let filtered = allEvents.filter(event => {
      const matchesSearch = !q || [
        event.title,
        event.chapter,
        event.date,
        event.time,
        event.location,
        event.description
      ].some(value => (value || "").toLowerCase().includes(q));

      const matchesChapter = !currentChapter || event.chapter === currentChapter;

      return matchesSearch && matchesChapter;
    });

    renderEvents(filtered);
  }

  function populateChapterFilter(events) {
    const chapterFilter = document.getElementById("chapter-filter");
    const chapters = [...new Set(events.map(event => event.chapter).filter(Boolean))].sort();

    chapters.forEach(chapter => {
      const option = document.createElement("option");
      option.value = chapter;
      option.textContent = chapter;
      chapterFilter.appendChild(option);
    });

    chapterFilter.addEventListener("change", event => {
      currentChapter = event.target.value;
      applyFilters();
    });
  }

  fetch("events.json?v=" + Date.now())
    .then(response => response.json())
    .then(events => {
      allEvents = events;
      populateChapterFilter(allEvents);
      renderEvents(allEvents);

      const searchInput = document.getElementById("search");
      const form = document.querySelector(".search-form");

      searchInput.addEventListener("input", event => {
        currentSearch = event.target.value;
        applyFilters();
      });

      form.addEventListener("submit", event => {
        event.preventDefault();
        currentSearch = searchInput.value;
        applyFilters();
      });
    });
</script>
</body>
</html>
